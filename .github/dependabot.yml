version: 2

# requirements.txt is pinned to exact versions so the unattended 6 AM run
# can't break from an upstream release. That trade means the pins go stale
# silently — Dependabot is what turns them back into visible, reviewable work.
updates:
  - package-ecosystem: pip
    directory: /ai-daily-briefing
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"

  # Actions are pinned to major tags, which are mutable — this surfaces the
  # real releases behind them, and catches deprecations (Node 20 -> 24) before
  # they turn into warnings on every run.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
