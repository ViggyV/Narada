name: Daily Briefing (6:00 AM Chicago)

on:
  schedule:
    # GitHub cron is UTC-only. 6 AM Chicago = 11:00 UTC (CDT) or 12:00 UTC (CST).
    # Both fire; src/main.py only proceeds when it's actually 6 AM local.
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# Both cron entries fire daily and a manual dispatch can land on top of them.
# Two jobs reaching `git push` together means one loses its work, so runs are
# serialised. Never cancel in flight: a half-finished run may already have
# committed the briefing without deploying it.
concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ai-daily-briefing/requirements.txt pytest

      # Fail before touching the published site, not after.
      - name: Run tests
        run: python -m pytest ai-daily-briefing/tests -q

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python ai-daily-briefing/src/main.py

      - name: Build blog site
        run: python ai-daily-briefing/src/build_site.py

      - name: Build loop-engineering site
        run: python loop-engineering/build.py

      # The briefing stays at the root so existing URLs keep working; the
      # guide is mounted beside it rather than replacing anything.
      - name: Assemble Pages bundle
        run: |
          rm -rf _site
          mkdir -p _site/loop-engineering
          cp -R ai-daily-briefing/site/. _site/
          cp loop-engineering/*.html loop-engineering/style.css _site/loop-engineering/
          find _site -name '*.html' | sort

      - name: Commit briefing and site
        run: |
          git config user.name "narada-bot"
          git config user.email "actions@users.noreply.github.com"
          git add ai-daily-briefing/briefings ai-daily-briefing/site loop-engineering
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Daily briefing $(date -u +%F)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: briefing
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
