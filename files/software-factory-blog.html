<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Factory Playbook</title>
<meta name="description" content="A field guide to building a software factory: golden paths, CI/CD, supply-chain security, platform engineering, and DORA metrics.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F6F3;
  --card:#FFFFFF;
  --ink:#1A222B;
  --steel:#5A6672;
  --line:#DCE1DD;
  --blue:#2456C8;
  --blue-tint:#EAF0FB;
  --blue-dark:#173C8E;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --display:'Space Grotesk',system-ui,-apple-system,sans-serif;
  --body:'Source Serif 4',Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important;animation:none!important}}
body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.7}

/* ---------- layout ---------- */
.wrap{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
aside{border-right:1px solid var(--line);padding:2.2rem 1.6rem 3rem;position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--paper)}
main{min-width:0}
.page{max-width:74ch;margin:0 auto;padding:3.2rem 2.4rem 5rem}

/* ---------- masthead ---------- */
.mast{margin-bottom:2.4rem}
.mast .kicker{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);display:block;margin-bottom:.5rem}
.mast h1{font-family:var(--display);font-weight:700;font-size:1.28rem;line-height:1.25;letter-spacing:-.01em}
.mast p{font-size:.82rem;color:var(--steel);margin-top:.55rem;line-height:1.5;font-family:var(--body)}

/* ---------- assembly line nav ---------- */
nav.line{position:relative;padding-left:1.55rem}
nav.line::before{content:"";position:absolute;left:.62rem;top:.9rem;bottom:.9rem;width:2px;background:var(--line)}
nav.line a{display:block;position:relative;padding:.42rem 0 .42rem .35rem;text-decoration:none;color:var(--steel);font-family:var(--display);font-weight:500;font-size:.86rem;line-height:1.35;border-radius:4px}
nav.line a .st{font-family:var(--mono);font-size:.66rem;color:var(--steel);display:block;letter-spacing:.1em}
nav.line a::before{content:"";position:absolute;left:-1.25rem;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--paper);border:2px solid var(--steel);transition:background .15s,border-color .15s}
nav.line a:hover{color:var(--ink)}
nav.line a:hover::before{border-color:var(--ink)}
nav.line a.active{color:var(--blue-dark)}
nav.line a.active .st{color:var(--blue)}
nav.line a.active::before{background:var(--blue);border-color:var(--blue)}
nav.line a:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

/* ---------- article header ---------- */
.doc-eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.doc-eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------- markdown content ---------- */
article h1{font-family:var(--display);font-weight:700;font-size:2.15rem;line-height:1.15;letter-spacing:-.02em;margin:.2rem 0 1.4rem}
article h2{font-family:var(--display);font-weight:700;font-size:1.35rem;letter-spacing:-.01em;margin:2.6rem 0 .9rem;padding-top:1.2rem;border-top:1px solid var(--line)}
article h3{font-family:var(--display);font-weight:700;font-size:1.05rem;margin:1.8rem 0 .6rem}
article h4{font-family:var(--display);font-weight:500;font-size:.95rem;margin:1.4rem 0 .5rem;color:var(--steel)}
article p{margin:0 0 1.05rem}
article a{color:var(--blue);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}
article a:hover{color:var(--blue-dark)}
article ul,article ol{margin:0 0 1.05rem 1.4rem}
article li{margin-bottom:.4rem}
article li>ul,article li>ol{margin-top:.4rem;margin-bottom:.4rem}
article strong{font-weight:600}
article blockquote{border-left:3px solid var(--blue);background:var(--blue-tint);padding:.85rem 1.2rem;margin:0 0 1.05rem;border-radius:0 6px 6px 0}
article blockquote p:last-child{margin-bottom:0}
article code{font-family:var(--mono);font-size:.83em;background:var(--blue-tint);color:var(--blue-dark);padding:.1em .35em;border-radius:4px}
article pre{background:var(--ink);color:#DBE4EE;border-radius:8px;padding:1.1rem 1.3rem;overflow-x:auto;margin:0 0 1.2rem;font-size:.8rem;line-height:1.55}
article pre code{background:none;color:inherit;padding:0;font-size:inherit}
article table{width:100%;border-collapse:collapse;margin:0 0 1.3rem;font-size:.88rem;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden;font-family:var(--body)}
article th{font-family:var(--display);font-weight:700;font-size:.78rem;text-align:left;padding:.6rem .85rem;background:var(--blue-tint);color:var(--blue-dark);border-bottom:1px solid var(--line)}
article td{padding:.55rem .85rem;border-bottom:1px solid var(--line);vertical-align:top}
article tr:last-child td{border-bottom:none}
article hr{border:none;border-top:1px solid var(--line);margin:2rem 0}
article img{max-width:100%}

/* ---------- prev / next ---------- */
.pager{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:3.5rem;padding-top:1.6rem;border-top:2px solid var(--ink)}
.pager a{display:block;text-decoration:none;color:var(--ink);border:1px solid var(--line);background:var(--card);border-radius:8px;padding:.9rem 1.1rem;transition:border-color .15s}
.pager a:hover{border-color:var(--blue)}
.pager .dir{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--steel);display:block;margin-bottom:.3rem}
.pager .t{font-family:var(--display);font-weight:700;font-size:.92rem}
.pager .next{text-align:right}
.pager .spacer{visibility:hidden}

footer.colophon{font-family:var(--mono);font-size:.68rem;color:var(--steel);margin-top:2.6rem;letter-spacing:.05em}

/* ---------- mobile ---------- */
.menu-btn{display:none}
@media (max-width:880px){
  .wrap{display:block}
  aside{position:fixed;inset:0 auto 0 0;width:min(82vw,320px);transform:translateX(-100%);transition:transform .2s ease;z-index:40;box-shadow:0 0 40px rgba(20,30,40,.18)}
  aside.open{transform:none}
  .menu-btn{display:flex;align-items:center;gap:.5rem;position:sticky;top:0;z-index:30;width:100%;background:var(--paper);border:none;border-bottom:1px solid var(--line);padding:.8rem 1.2rem;font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);cursor:pointer}
  .menu-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--blue)}
  .page{padding:2rem 1.2rem 4rem}
  article h1{font-size:1.7rem}
  .pager{grid-template-columns:1fr}
  .pager .next{text-align:left}
}
</style>
</head>
<body>
<div class="wrap">
  <aside id="sidebar">
    <div class="mast">
      <span class="kicker">Field Guide · v1.0</span>
      <h1>Software Factory Playbook</h1>
      <p>Tools and practices for turning software delivery into a repeatable, automated, measurable system.</p>
    </div>
    <nav class="line" id="nav" aria-label="Playbook sections"></nav>
  </aside>
  <main>
    <button class="menu-btn" id="menuBtn" aria-expanded="false" aria-controls="sidebar"><span class="dot"></span>Contents</button>
    <div class="page">
      <div class="doc-eyebrow" id="eyebrow"></div>
      <article id="content"></article>
      <div class="pager" id="pager"></div>
      <footer class="colophon">Software Factory Playbook · generated docs-as-code · stored in the Narada repo</footer>
    </div>
  </main>
</div>

<script>
const DOCS = [{"slug": "00-overview", "num": "00", "title": "Overview", "md": "# Software Factory Playbook \u2014 Overview\n\n> A software factory is not a place. It is a repeatable, automated, measurable system for turning ideas into running software \u2014 where the *process* of building is engineered as deliberately as the products themselves.\n\n## What \"software factory\" means here\n\nTraditional teams treat every project as a bespoke effort: new repo layout, new pipeline, new deployment scripts, new security review. A software factory inverts that. It standardizes the *how* (paths, pipelines, guardrails, tooling) so teams can spend their creativity on the *what* (the product).\n\nThe output of the factory is not just software \u2014 it's **software plus confidence**: every artifact ships with tests passed, security scanned, provenance attested, and rollback ready.\n\n## Core outcomes to aim for\n\n| Outcome | Target signal |\n|---|---|\n| Fast flow | Idea \u2192 production in days, not months |\n| Repeatability | New service scaffolded and deployed in < 1 hour |\n| Safety | Every change gated by automated quality + security checks |\n| Visibility | DORA metrics + cost + security posture on one dashboard |\n| Autonomy | Teams self-serve infra without tickets |\n\n## The series\n\n| Doc | Topic |\n|---|---|\n| [01](01-principles.md) | Principles & operating model |\n| [02](02-golden-paths.md) | Golden paths & paved roads (templates, scaffolding) |\n| [03](03-source-control-and-cicd.md) | Source control, branching, CI/CD |\n| [04](04-testing-and-quality.md) | Testing strategy & quality gates |\n| [05](05-security-and-supply-chain.md) | Security, secrets, supply chain (SBOM, signing) |\n| [06](06-platform-and-tooling.md) | Internal developer platform & tool stack |\n| [07](07-observability-and-operations.md) | Observability, SRE, incident practice |\n| [08](08-metrics-and-dora.md) | Metrics: DORA, SPACE, cost |\n| [09](09-adoption-roadmap.md) | 12-month adoption roadmap |\n\n## Who this is for\n\n- **Engineering leaders** deciding what to standardize vs. leave flexible\n- **Platform teams** building the paved roads\n- **Product teams** who will live on those roads\n\nStart with [01 \u2014 Principles](01-principles.md).\n"}, {"slug": "01-principles", "num": "01", "title": "Principles & Operating Model", "md": "# 01 \u2014 Principles & Operating Model\n\nThe factory succeeds or fails on principles, not tools. Tools change; these shouldn't.\n\n## The seven principles\n\n### 1. Everything as code\nInfrastructure, pipelines, policies, dashboards, alerts, and docs live in version control. If it can't be code-reviewed and rolled back, it doesn't exist.\n\n### 2. Paved roads, not gates\nMake the right way the easy way. A team using the golden path gets CI/CD, security scanning, deployment, and observability *for free*. Teams may go off-road, but they own the extra work and risk. Prefer incentives over mandates.\n\n### 3. Small batches, always releasable\nTrunk-based development, feature flags, and continuous delivery. `main` is deployable at all times. Big-bang releases are a failure mode, not an event.\n\n### 4. Shift left, but automate the shift\nSecurity, quality, and compliance checks run in the pipeline, in the editor, and in pre-commit \u2014 not in a review meeting three weeks later. A human should only be involved when a machine can't decide.\n\n### 5. Self-service by default\nProvisioning a database, a service, a domain, or a dashboard is a pull request or a portal click \u2014 never a ticket to another team. The platform team builds products; other teams are their customers.\n\n### 6. Measure the system, not the people\nMetrics (DORA, lead time, change failure rate) evaluate the *factory's* health. The moment a metric becomes an individual performance target, it gets gamed and dies (Goodhart's law).\n\n### 7. Continuous improvement is scheduled\nReserve real capacity (15\u201325%) for platform work, debt paydown, and tooling. \"We'll fix it when things calm down\" means never.\n\n## Operating model\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502                    Product Teams                       \u2502\n\u2502   (stream-aligned: own build, ship, run for a domain)  \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502                 Enabling Teams (rotational)            \u2502\n\u2502   (coaching: testing, security, performance)           \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502                    Platform Team                       \u2502\n\u2502   (IDP, CI/CD, golden paths, infra \u2014 run as a product) \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nThis mirrors the **Team Topologies** model: stream-aligned teams deliver value; the platform team reduces their cognitive load; enabling teams close skill gaps temporarily.\n\n## Decision rules\n\n- **Standardize** anything undifferentiated: pipelines, base images, logging, auth, secrets.\n- **Leave flexible** anything close to the product: domain logic, UX, data models.\n- **Two-way doors** (reversible choices) get decided fast and locally. **One-way doors** (languages, cloud, datastore) get an ADR and a review.\n\n## Anti-patterns to reject early\n\n- A \"DevOps team\" that becomes a ticket queue between dev and prod\n- Standardization by memo instead of by tooling\n- 100% utilization planning \u2014 leaves no room for incidents or improvement\n- Metrics dashboards nobody acts on\n\nNext: [02 \u2014 Golden Paths & Paved Roads](02-golden-paths.md)\n"}, {"slug": "02-golden-paths", "num": "02", "title": "Golden Paths & Paved Roads", "md": "# 02 \u2014 Golden Paths & Paved Roads\n\nA golden path is an opinionated, supported, end-to-end route from \"new idea\" to \"running in production.\" It's the factory's assembly line.\n\n## What a golden path includes\n\nWhen a developer runs `factory new service --template go-api`, they should get:\n\n1. **Repo scaffolding** \u2014 standard layout, README, CODEOWNERS, LICENSE\n2. **CI/CD pipeline** \u2014 pre-wired build/test/scan/deploy workflow\n3. **Containerization** \u2014 hardened base image, multi-stage Dockerfile\n4. **Infra as code** \u2014 Terraform/OpenTofu module or Helm chart for the service\n5. **Observability** \u2014 structured logging, metrics, tracing pre-instrumented (OpenTelemetry)\n6. **Security defaults** \u2014 secret scanning, dependency scanning, SAST enabled\n7. **Service catalog entry** \u2014 auto-registered in Backstage (or equivalent) with owner, tier, on-call, docs\n8. **Environments** \u2014 dev/staging namespaces provisioned, prod behind promotion gate\n\nTarget: **under 60 minutes** from `factory new` to a hello-world endpoint live in staging.\n\n## Tooling options\n\n| Capability | Common choices |\n|---|---|\n| Scaffolding / templates | Backstage Software Templates, Cookiecutter, Copier, Yeoman |\n| Service catalog | Backstage, Port, Cortex, OpsLevel |\n| IaC modules | Terraform/OpenTofu registries, Pulumi, Crossplane compositions |\n| Dev environments | Devcontainers, Nix, GitPod/Codespaces |\n\n## Template governance\n\n- Templates live in a `templates/` monorepo owned by the platform team.\n- Every template has a **maintainer**, a **changelog**, and **automated tests** (scaffold \u2192 build \u2192 deploy in CI on every template change).\n- **Drift management**: use a tool like Copier's update mechanism or Renovate-style PRs to push template updates into existing services. Never let scaffolded repos fossilize.\n\n## Sample template inventory (start small)\n\n1. `backend-api` \u2014 REST/gRPC service in your primary language\n2. `frontend-app` \u2014 SPA/SSR app with design system wired in\n3. `worker` \u2014 queue consumer / scheduled job\n4. `library` \u2014 internal shared package with publishing pipeline\n5. `data-pipeline` \u2014 batch/stream job with orchestration hooks\n\nResist making 20 templates on day one. Three excellent templates beat fifteen stale ones.\n\n## The off-road policy\n\nTeams can deviate \u2014 but the deal is explicit:\n\n> **On the paved road**: platform team supports your pipeline, upgrades your base images, answers your pages about shared tooling.\n> **Off-road**: you own your pipeline, your patching, your 3 a.m. mystery. You must still meet the same security and compliance bars, verified by policy-as-code (see doc 05).\n\nTrack paved-road adoption as a platform KPI (e.g., % of services on a current template version).\n\nNext: [03 \u2014 Source Control & CI/CD](03-source-control-and-cicd.md)\n"}, {"slug": "03-source-control-and-cicd", "num": "03", "title": "Source Control, Branching & CI/CD", "md": "# 03 \u2014 Source Control, Branching & CI/CD\n\nThe pipeline *is* the factory floor. Everything else feeds it or consumes it.\n\n## Source control practices\n\n- **Trunk-based development**: short-lived branches (< 1\u20132 days), merged to `main` continuously. Long-lived feature branches are where merges go to die.\n- **Feature flags** decouple deploy from release. Incomplete work ships dark. (Tools: LaunchDarkly, Unleash, OpenFeature, or a homegrown config service.)\n- **Protected `main`**: required status checks, required review, no force-push, linear history.\n- **Conventional Commits** + automated changelog/versioning (semantic-release, release-please).\n- **CODEOWNERS** routes reviews automatically; keep files small and ownership real.\n- **Mono vs. multi-repo**: either works. Choose based on your tooling maturity \u2014 monorepos need investment (Bazel/Nx/Turborepo, merge queues); multi-repo needs strong templates and drift management.\n\n## Pipeline reference architecture\n\n```\ncommit \u2192 pre-merge CI \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25ba merge queue \u2500\u2500\u25ba main\n              \u2502                                    \u2502\n   lint \u00b7 unit tests \u00b7 SAST \u00b7              build once, promote\n   secret scan \u00b7 license check                     \u2502\n                                                   \u25bc\n                                        \u250c\u2500\u2500 artifact registry \u2500\u2500\u2510\n                                        \u2502  (signed image + SBOM) \u2502\n                                        \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                                    \u25bc\n                                   deploy: dev \u2192 staging \u2192 canary \u2192 prod\n                                        (GitOps pull, auto-rollback)\n```\n\n### Rules of the pipeline\n\n1. **Build once, promote many.** The exact artifact tested in staging is what ships to prod. Rebuilding per-environment invalidates your testing.\n2. **Fast feedback first.** Pre-merge CI under 10 minutes. Push slow suites (E2E, load) post-merge or nightly.\n3. **Merge queue** (GitHub merge queue, Mergify, Bors-style) keeps `main` green under high commit volume.\n4. **Ephemeral, hermetic builds.** Pinned toolchains, no snowflake build agents, cache aggressively (remote build cache).\n5. **Deployment is boring.** GitOps (Argo CD / Flux) reconciles desired state; humans approve promotions, machines execute them.\n6. **Progressive delivery.** Canary or blue/green with automated rollback on SLO burn (Argo Rollouts, Flagger).\n\n## Tool stack cheat sheet\n\n| Layer | Options |\n|---|---|\n| VCS host | GitHub, GitLab, Bitbucket |\n| CI | GitHub Actions, GitLab CI, Buildkite, CircleCI, Jenkins (legacy) |\n| Build systems (monorepo) | Bazel, Nx, Turborepo, Pants |\n| Artifact registry | GitHub Packages, Artifactory, ECR/GAR/ACR, Harbor |\n| CD / GitOps | Argo CD, Flux, Spinnaker, Octopus |\n| Progressive delivery | Argo Rollouts, Flagger |\n| Environments | Kubernetes + vcluster/namespaces, Nomad, ECS |\n\n## Environment strategy\n\n- **Ephemeral preview environments** per PR for anything with a UI or API contract \u2014 reviewers click a link, not check out a branch.\n- **Staging mirrors prod** in topology, not in scale. Synthetic + masked data only.\n- **Production access** is break-glass, audited, and time-boxed. Day-to-day changes go through the pipeline, period.\n\n## Definition of done for a change\n\nA change is done when it is: merged to main, deployed to production behind its flag, observable (metrics/logs/traces emitting), and its flag cleanup ticket exists.\n\nNext: [04 \u2014 Testing & Quality](04-testing-and-quality.md)\n"}, {"slug": "04-testing-and-quality", "num": "04", "title": "Testing Strategy & Quality Gates", "md": "# 04 \u2014 Testing Strategy & Quality Gates\n\nThe factory's promise is that anything reaching `main` is releasable. Testing is how that promise gets kept.\n\n## The shape of the suite\n\nAim for a **testing trophy / pyramid hybrid**:\n\n```\n        \u25b2  E2E (few, critical journeys only)\n       \u25b2\u25b2  Contract & integration (the workhorses)\n     \u25b2\u25b2\u25b2\u25b2  Unit (fast, deterministic, thousands)\n    \u2500\u2500\u2500\u2500\u2500\u2500 Static analysis (types, linting, SAST) \u2014 the free base layer\n```\n\n| Layer | Purpose | Budget in pre-merge CI |\n|---|---|---|\n| Static (types, lint, format) | Catch entire bug classes for free | seconds |\n| Unit | Logic correctness, fast feedback | 2\u20134 min |\n| Contract (Pact, OpenAPI/protobuf schema checks) | Services can't break each other silently | 1\u20132 min |\n| Integration (Testcontainers) | Real DB/queue behavior without mocks-lying | 3\u20135 min |\n| E2E (Playwright/Cypress) | 5\u201315 critical user journeys, post-merge | 10\u201320 min post-merge |\n\n## Practices that matter more than coverage %\n\n- **Deterministic tests or delete them.** A flaky test is worse than no test \u2014 it trains people to click \"re-run.\" Quarantine flakes automatically (tag, skip, ticket) and track flake rate as a platform metric.\n- **Test data as code.** Factories/builders, not shared fixture dumps. Never test against production data.\n- **Contract tests over full-environment E2E** for service interactions \u2014 they're fast, isolated, and pinpoint the breaking side.\n- **Mutation testing** (Stryker, PIT) on critical modules occasionally \u2014 it audits whether tests actually assert anything.\n- **Performance budgets in CI**: bundle size, p95 latency on key endpoints, cold-start time. Regressions fail the build like any other bug.\n\n## Quality gates (enforced by pipeline, not by meeting)\n\nA merge is blocked unless:\n\n1. All required checks green (build, unit, contract, lint, types)\n2. No new critical/high SAST or secret findings\n3. Diff coverage \u2265 agreed floor on changed lines (e.g., 80%) \u2014 *diff* coverage, not total, so legacy code doesn't block progress\n4. At least one qualified review (CODEOWNERS)\n5. No unresolved license violations in new dependencies\n\nKeep the gate list short and non-negotiable. Every gate you add must pay for its friction.\n\n## Code review practice\n\n- Small PRs (< ~400 lines changed) \u2014 review quality collapses beyond that\n- Review SLA: first response within one business day; automate the nag\n- Reviewers check design, correctness, and clarity; formatting and style are the linter's job, never a human comment\n- AI-assisted review (e.g., LLM reviewers) as a *first pass*, never the final gate\n\n## Non-functional testing cadence\n\n| Type | Cadence | Tools |\n|---|---|---|\n| Load / soak | Pre-release for major changes, monthly baseline | k6, Gatling, Locust |\n| Chaos | Quarterly game days \u2192 automated experiments | Litmus, Gremlin, AWS FIS |\n| Accessibility | Every PR touching UI | axe-core in CI |\n| DR restore test | Quarterly, timed, documented | your backup tooling + runbook |\n\nNext: [05 \u2014 Security & Supply Chain](05-security-and-supply-chain.md)\n"}, {"slug": "05-security-and-supply-chain", "num": "05", "title": "Security, Secrets & Supply Chain", "md": "# 05 \u2014 Security, Secrets & Supply Chain\n\nModern software factories are attacked through their *pipelines* as often as their products. Security here is a build-in property, automated end to end.\n\n## The layered model\n\n```\nCode \u2500\u2500 Dependencies \u2500\u2500 Build \u2500\u2500 Artifact \u2500\u2500 Deploy \u2500\u2500 Runtime\n \u2502           \u2502            \u2502         \u2502           \u2502         \u2502\nSAST      SCA/updates   hermetic  signing +   policy    runtime\nsecret    license       builds,   SBOM,       as code   detection,\nscanning  checks        SLSA      provenance  (OPA)     least-priv\n```\n\n## Code & dependencies\n\n- **Secret scanning** in pre-commit *and* CI *and* on the VCS host (Gitleaks, TruffleHog, GitHub secret scanning). A leaked secret is an incident: rotate first, investigate second.\n- **SAST** on every PR (Semgrep, CodeQL, SonarQube). Tune rules ruthlessly \u2014 a noisy scanner gets ignored, which is worse than none.\n- **SCA / dependency scanning** (Dependabot, Renovate, Snyk, OSV-Scanner) with *automated update PRs*. The practice that matters is not scanning \u2014 it's **merging updates weekly** so patching a zero-day is routine, not heroic.\n- **License policy as code**: allow/deny lists checked in CI (e.g., FOSSA, license-checker), so legal review isn't a launch-day surprise.\n\n## Build integrity (SLSA-aligned)\n\n- **Hermetic, ephemeral builders** \u2014 no long-lived agents accumulating credentials.\n- **Pinned dependencies** (lockfiles, digest-pinned base images, pinned CI actions by SHA).\n- **Sign every artifact** (Sigstore/cosign) and generate **SBOMs** (Syft, CycloneDX) at build time; store them with the artifact.\n- **Provenance attestation** (SLSA provenance via GitHub artifact attestations or in-toto): the deploy system verifies \"this image was built by *our* pipeline from *this* commit\" before admitting it to prod.\n- Admission control enforces it: **unsigned or unattested images don't run** (Kyverno, OPA Gatekeeper, Sigstore policy-controller).\n\n## Secrets & identity\n\n- **No static secrets in code, CI variables, or laptops** where avoidable. Prefer short-lived, identity-based credentials: OIDC federation from CI to cloud (GitHub OIDC \u2192 AWS/GCP roles), workload identity in the cluster.\n- Where secrets must exist: a manager (Vault, AWS Secrets Manager, GCP Secret Manager) with rotation, audit, and app-side injection (External Secrets Operator).\n- **Human access**: SSO + MFA everywhere, just-in-time elevation (e.g., short-lived roles), quarterly access reviews automated from IdP data.\n\n## Policy as code\n\nEncode the rules once, enforce everywhere:\n\n- **Infra policies** (OPA/Conftest, Checkov, tfsec): no public buckets, mandatory tags, encryption on.\n- **Cluster policies** (Kyverno/Gatekeeper): no `latest` tags, resource limits required, non-root containers.\n- **Pipeline policies**: required checks defined centrally (org rulesets), not per-repo goodwill.\n\nThis is also how the off-road teams from doc 02 stay honest: policy applies to everyone; only support differs.\n\n## Runtime & response\n\n- Runtime detection (Falco, GuardDuty, Defender) wired to the same alerting as ops.\n- **Vulnerability SLAs**: critical 7 days, high 30 days \u2014 tracked on the same dashboard as DORA metrics so security debt is visible next to delivery speed.\n- Threat modeling as a lightweight ritual: one hour at design time for any new externally-facing surface, using a simple STRIDE checklist.\n\n## Compliance without tears\n\nIf you need SOC 2 / ISO 27001 / FedRAMP-style evidence: the factory *is* the evidence. Pipelines, signed artifacts, access logs, and policy checks generate audit trails continuously (helped by tools like Vanta/Drata). Design controls into the paved road once instead of collecting screenshots annually.\n\nNext: [06 \u2014 Platform & Tooling](06-platform-and-tooling.md)\n"}, {"slug": "06-platform-and-tooling", "num": "06", "title": "Internal Developer Platform & Tool Stack", "md": "# 06 \u2014 Internal Developer Platform & Tool Stack\n\nThe platform is the factory's machinery: the self-service layer that lets product teams provision, deploy, and operate without tickets.\n\n## Platform-as-a-product\n\nTreat the IDP like a product with customers (your developers):\n\n- A **roadmap** driven by developer pain, not platform-team hobbies\n- **Docs and onboarding** as first-class deliverables\n- **Adoption metrics** (paved-road %, time-to-first-deploy, ticket deflection)\n- Regular **developer experience surveys** (quarterly, short, acted on visibly)\n\nThe fastest way to kill a platform: mandate it before it's better than the alternative.\n\n## Reference tool stack (pick per column, don't buy everything)\n\n| Capability | Options |\n|---|---|\n| Developer portal / catalog | Backstage, Port, Cortex, OpsLevel |\n| Cloud | AWS / GCP / Azure (pick one primary) |\n| IaC | Terraform/OpenTofu, Pulumi, Crossplane |\n| Runtime | Kubernetes (EKS/GKE/AKS), ECS/Fargate, Cloud Run |\n| CI/CD | see doc 03 |\n| Secrets | Vault, cloud-native managers + External Secrets |\n| Observability | see doc 07 |\n| Feature flags | LaunchDarkly, Unleash, OpenFeature |\n| Data platform | Snowflake/BigQuery/Databricks + dbt + orchestration (Airflow/Dagster) |\n| Local dev | Devcontainers, Tilt, Skaffold, Docker Compose |\n| AI assistance | Copilot/Claude Code-style agents + org-wide usage policy |\n\n## Self-service surfaces\n\nOffer the same capabilities through three doors, backed by one implementation:\n\n1. **CLI** (`factory new`, `factory deploy`, `factory db create`) \u2014 power users\n2. **Portal UI** (Backstage plugins/Port actions) \u2014 discoverability\n3. **Pull requests to config repos** \u2014 auditability, GitOps-native\n\nEverything a team can self-serve should be **scored by tier**: e.g., a `tier-1` (customer-facing, revenue-critical) service automatically gets stricter policies, mandatory on-call, and higher SLO requirements than a `tier-3` internal tool.\n\n## AI in the factory (2026 reality)\n\n- **Coding agents** (IDE + CLI) with an explicit policy: what data they may see, which repos they may touch, and mandatory human review on generated changes.\n- **AI in the pipeline**: PR summarization, first-pass review, test generation, incident-summary drafting. Keep humans as the accountable gate.\n- **Evaluation for AI features**: if your products embed LLMs, add eval suites and prompt/version tracking to the pipeline exactly like tests (promptfoo, Braintrust, LangSmith-style tooling).\n- Track AI-assisted change quality separately for a while (defect rate, review time) before trusting it at higher autonomy.\n\n## Cognitive load budget\n\nEvery tool added must remove more load than it adds. Practical tests:\n\n- Can a new hire ship to production in **week one** using only the docs?\n- Does an average service require the team to understand **fewer than ~5 platform concepts** to operate day-to-day?\n- Is there exactly **one** obvious way to do the common thing?\n\nWhen the answer turns no, consolidate before adding.\n\n## Documentation system\n\n- **Docs-as-code**: markdown in repos, rendered in the portal (Backstage TechDocs, MkDocs).\n- Three doc types, deliberately separated: **tutorials/onboarding**, **how-to runbooks**, **reference/ADRs**.\n- **ADRs** (architecture decision records) for one-way doors \u2014 short, numbered, immutable-with-superseding.\n- Docs rot policy: pages carry owners and review dates; stale pages get flagged automatically.\n\nNext: [07 \u2014 Observability & Operations](07-observability-and-operations.md)\n"}, {"slug": "07-observability-and-operations", "num": "07", "title": "Observability, SRE & Incident Practice", "md": "# 07 \u2014 Observability, SRE & Incident Practice\n\nA factory that can't see its output can't improve it. Observability is pre-wired into every golden path so teams never bolt it on later.\n\n## The three-plus-one signals\n\n| Signal | Standard | Tools |\n|---|---|---|\n| Metrics | Prometheus/OpenMetrics | Prometheus + Grafana, Datadog, Cloud Monitoring |\n| Logs | Structured JSON, correlation IDs | Loki, Elastic, Datadog, CloudWatch |\n| Traces | **OpenTelemetry everywhere** | Tempo, Jaeger, Honeycomb, Datadog APM |\n| Profiles (the +1) | Continuous profiling | Pyroscope, Parca, cloud profilers |\n\nNon-negotiables baked into templates:\n\n- OpenTelemetry SDK auto-instrumented; trace context propagated across every hop\n- Structured logs with `trace_id`, `service`, `version`, `env`\n- RED metrics (rate, errors, duration) exported per endpoint by default\n- Dashboards and alerts **generated from code** alongside the service (Grafana-as-code, Terraform)\n\n## SLOs over raw alerts\n\n- Every `tier-1`/`tier-2` service defines **SLOs** (e.g., 99.9% availability, p95 < 300ms) with **error budgets**.\n- Alert on **budget burn rate**, not on every CPU spike. Symptom-based paging; cause-based dashboards.\n- Error budget policy has teeth: budget exhausted \u2192 feature work pauses in favor of reliability work. Agreed in advance, so it's policy, not a fight.\n\n## On-call that doesn't burn people\n\n- **You build it, you run it** \u2014 the team that ships a service carries its pager.\n- Rotation hygiene: \u2265 4 people per rotation, page volume tracked, > 2 pages/night triggers a mandatory noise-reduction review.\n- Every page must be **actionable and have a runbook link**. Un-actionable alerts get deleted, not snoozed.\n- Tools: PagerDuty, Opsgenie, Grafana OnCall, incident.io.\n\n## Incident practice\n\n1. **Declare early, declare cheap.** Low friction to open an incident (slash command creates channel, doc, roles).\n2. **Roles**: incident commander, comms lead, ops lead \u2014 commander coordinates, doesn't debug.\n3. **Rollback first, diagnose second** for user-facing impact. Progressive delivery (doc 03) makes rollback a button.\n4. **Blameless postmortems** for every SEV-1/2 within 5 business days: timeline, contributing factors (plural \u2014 never \"root cause: human error\"), and action items with owners and due dates.\n5. **Action-item follow-through** is tracked like product work; postmortems without completed actions are theater.\n\n## Reliability engineering cadence\n\n| Ritual | Cadence |\n|---|---|\n| SLO review per service | Monthly |\n| Game day / chaos experiment | Quarterly |\n| DR restore drill (timed) | Quarterly |\n| Dependency failure review (\"what if X is down?\") | Semi-annual |\n| Capacity & cost review | Monthly (see FinOps in doc 08) |\n\n## Operational readiness gate\n\nBefore a new service takes production traffic, an automated checklist verifies: SLOs defined, dashboards live, alerts wired to a rotation, runbook exists, rollback tested, backups configured. This is a template output, not a manual audit \u2014 the paved road makes it nearly free.\n\nNext: [08 \u2014 Metrics & DORA](08-metrics-and-dora.md)\n"}, {"slug": "08-metrics-and-dora", "num": "08", "title": "Metrics: DORA, SPACE & Cost", "md": "# 08 \u2014 Metrics: DORA, SPACE & Cost\n\nYou can't tune a factory you don't measure. But measure the *system*, act on trends, and never weaponize metrics against individuals.\n\n## DORA \u2014 the four keys (plus reliability)\n\n| Metric | Elite benchmark | What it tells you |\n|---|---|---|\n| Deployment frequency | On-demand / multiple per day | Batch size & pipeline health |\n| Lead time for changes (commit \u2192 prod) | < 1 day | Flow efficiency |\n| Change failure rate | < 5\u201315% | Quality of gates & testing |\n| Failed deployment recovery time | < 1 hour | Rollback & incident maturity |\n| (5th) Reliability / SLO attainment | Meets targets | Whether speed is sustainable |\n\n**Collection**: derive automatically from your VCS + CD + incident tooling (Sleuth, LinearB, Swarmia, DX, or homegrown from GitHub/Argo/PagerDuty APIs). Manual reporting rots in a month.\n\n**Interpretation rules**\n\n- Compare a team **to its own trend**, not to other teams.\n- The four move together \u2014 optimizing deploy frequency while change failure rate climbs means you're just shipping bugs faster.\n- Read them quarterly at the org level, monthly at the team level.\n\n## SPACE / developer experience\n\nDORA measures the pipe; SPACE measures the humans:\n\n- **S**atisfaction: quarterly DevEx survey (keep it under 10 questions, publish results and actions)\n- **P**erformance: outcome metrics per team (their own KPIs, not story points)\n- **A**ctivity: use only for spotting friction (e.g., PRs stuck in review), never for ranking\n- **C**ommunication: review turnaround time, cross-team dependency wait time\n- **E**fficiency/flow: perceived focus time, meeting load, build wait time\n\nThe highest-leverage numbers in practice: **CI duration, review turnaround, flake rate, time-to-first-deploy for new hires.** All four are platform-fixable.\n\n## Cost (FinOps) \u2014 the factory's unit economics\n\n- **Tag or die**: every resource carries `service`, `team`, `env` tags, enforced by policy-as-code.\n- **Showback monthly** per team/service; chargeback only when the org is mature enough not to fight about it.\n- Track **unit cost** (cost per request / per customer / per build minute), not just total spend \u2014 totals rise with success; unit costs shouldn't.\n- CI cost is real money: cache hit rate and pipeline minutes belong on the platform dashboard.\n- Tools: cloud-native cost tools, Kubecost/OpenCost, Vantage, CloudZero.\n\n## One dashboard, one narrative\n\nCombine on a single platform-health view:\n\n```\nDelivery:   deploy freq \u00b7 lead time \u00b7 CFR \u00b7 recovery time\nQuality:    escaped defects \u00b7 flake rate \u00b7 diff coverage trend\nSecurity:   open crit/high vulns vs SLA \u00b7 % signed artifacts \u00b7 patch latency\nPlatform:   paved-road adoption % \u00b7 time-to-first-deploy \u00b7 DevEx score\nCost:       unit cost trend \u00b7 CI minutes \u00b7 idle resource %\n```\n\nReview it monthly with engineering leadership; every red trend gets an owner and an experiment, or it's just wall art.\n\n## Goodhart guardrails\n\n- No individual-level dashboards. Ever.\n- Retire any metric that stops driving decisions.\n- Pair every speed metric with a quality metric so gaming one shows up in the other.\n\nNext: [09 \u2014 Adoption Roadmap](09-adoption-roadmap.md)\n"}, {"slug": "09-adoption-roadmap", "num": "09", "title": "12-Month Adoption Roadmap", "md": "# 09 \u2014 12-Month Adoption Roadmap\n\nDon't build the whole factory before shipping through it. Build one paved road, run one team down it, then widen.\n\n## Quarter-by-quarter\n\n### Q1 \u2014 Foundations & first paved road\n**Goal: one team ships a real service through the full factory path.**\n\n- Stand up: VCS org standards (protected main, CODEOWNERS, rulesets), one CI system, artifact registry, one runtime environment\n- Build **one** golden-path template (backend-api) with CI/CD, scanning, OTel, and GitOps deploy wired in\n- Pick a **lighthouse team** (willing, mid-complexity service) and migrate them\n- Baseline metrics: capture current DORA numbers before you change anything\n\n*Exit criteria: lighthouse team deploys daily via the paved road; time-to-first-deploy for a new service < 1 day.*\n\n### Q2 \u2014 Security spine & second wave\n**Goal: supply-chain integrity on by default; 3\u20135 more teams onboard.**\n\n- Artifact signing + SBOM + provenance attestation in the shared pipeline; admission policy in staging (audit mode in prod)\n- Secrets migrated to a manager; CI\u2192cloud auth moved to OIDC (kill static keys)\n- Renovate/Dependabot org-wide with weekly merge cadence\n- Second template (worker or frontend); template drift-update mechanism working\n- Start the service catalog \u2014 every service gets an owner and a tier\n\n*Exit criteria: 100% of paved-road artifacts signed with SBOMs; zero static cloud keys in CI; 5+ services on templates.*\n\n### Q3 \u2014 Self-service platform & operations maturity\n**Goal: infra without tickets; on-call and SLOs standardized.**\n\n- Portal live (Backstage/Port) with scaffolding, catalog, and TechDocs\n- Self-service provisioning for the top 3 ticket types (database, queue, DNS/domain)\n- SLOs + burn-rate alerting for all tier-1 services; incident tooling and blameless postmortem process running\n- Preview environments per PR for the main product surfaces\n- First quarterly game day\n\n*Exit criteria: infra ticket volume down 50%; every tier-1 service has SLOs, runbooks, and a rotation.*\n\n### Q4 \u2014 Scale, measure, harden\n**Goal: majority adoption; the factory measurably outperforms the old way.**\n\n- Paved-road adoption \u2265 70% of active services; off-road teams meeting the same policy bars via policy-as-code\n- Admission policies in **enforce** mode in production\n- Unified platform-health dashboard (DORA + security + cost + DevEx) reviewed monthly with leadership\n- DR restore drill completed and timed; error-budget policy formally adopted\n- Publish the year-one before/after: lead time, CFR, time-to-first-deploy, DevEx score\n\n*Exit criteria: DORA lead time and recovery time improved \u2265 2x vs. Q1 baseline; DevEx satisfaction trending up.*\n\n## Team & investment guide\n\n| Org size | Platform investment |\n|---|---|\n| < 30 engineers | No dedicated team \u2014 a rotating \"paved road\" working group + strong SaaS defaults |\n| 30\u2013100 | 2\u20134 person platform team |\n| 100\u2013300 | 5\u201310, split infra / DX / security-enablement |\n| 300+ | Platform org with product management |\n\nRule of thumb: platform \u2248 **5\u20138% of engineering headcount**, run as a product (doc 06).\n\n## Common failure modes & counters\n\n| Failure | Counter |\n|---|---|\n| Big-bang platform, no users for a year | Lighthouse team in Q1; ship value monthly |\n| Mandated adoption of an inferior path | Make the paved road genuinely better first; measure adoption, don't decree it |\n| Platform becomes a ticket queue | Self-service SLA: any repeated ticket type becomes automation next sprint |\n| Security bolted on in Q4 | Signing/scanning in the *first* template (Q1\u2013Q2) |\n| Metrics theater | Every dashboard review ends with owners and experiments |\n| Template rot | Automated drift updates + template CI from day one |\n\n## The one-page summary\n\n1. **Standardize the undifferentiated** (pipelines, security, observability) so teams can differentiate on product.\n2. **Make the right way the easy way** \u2014 golden paths, self-service, policy-as-code.\n3. **Small batches, always releasable** \u2014 trunk, flags, progressive delivery.\n4. **Automate trust** \u2014 signed, attested, scanned artifacts; humans only where machines can't decide.\n5. **Measure the system, improve monthly** \u2014 DORA + DevEx + cost on one page, with owners.\n\nBack to [00 \u2014 Overview](00-overview.md)\n"}];
const bySlug = Object.fromEntries(DOCS.map((d,i)=>[d.slug,i]));

// rewrite links to .md files into hash routes
const renderer = {
  link(href, title, text){
    let h = href;
    if(typeof href === 'object'){ h = href.href; text = href.text; title = href.title; }
    const m = /^(?:\.\/)?([\w-]+)\.md$/.exec(h||'');
    const out = m ? `#${m[1]}` : h;
    return `<a href="${out}"${title?` title="${title}"`:''}>${text}</a>`;
  }
};
marked.use({ renderer, gfm: true });

const nav = document.getElementById('nav');
DOCS.forEach(d=>{
  const a = document.createElement('a');
  a.href = '#'+d.slug;
  a.id = 'nav-'+d.slug;
  a.innerHTML = `<span class="st">Station ${d.num}</span>${d.title}`;
  nav.appendChild(a);
});

function labelOf(d){ return d.num==='00' ? 'Overview' : d.title; }

function render(){
  const slug = (location.hash||'#').slice(1) || DOCS[0].slug;
  const i = bySlug[slug] ?? 0;
  const d = DOCS[i];
  document.getElementById('eyebrow').textContent = `Station ${d.num} of ${DOCS[DOCS.length-1].num}`;
  document.getElementById('content').innerHTML = marked.parse(d.md);
  document.title = `${labelOf(d)} · Software Factory Playbook`;
  DOCS.forEach(x=>document.getElementById('nav-'+x.slug).classList.toggle('active', x.slug===d.slug));
  const prev = DOCS[i-1], next = DOCS[i+1];
  document.getElementById('pager').innerHTML =
    (prev?`<a href="#${prev.slug}"><span class="dir">← Station ${prev.num}</span><span class="t">${labelOf(prev)}</span></a>`:'<span class="spacer"></span>')+
    (next?`<a class="next" href="#${next.slug}"><span class="dir">Station ${next.num} →</span><span class="t">${labelOf(next)}</span></a>`:'<span class="spacer"></span>');
  window.scrollTo({top:0,behavior:'auto'});
  sidebar.classList.remove('open'); menuBtn.setAttribute('aria-expanded','false');
}

const sidebar = document.getElementById('sidebar');
const menuBtn = document.getElementById('menuBtn');
menuBtn.addEventListener('click',()=>{
  const open = sidebar.classList.toggle('open');
  menuBtn.setAttribute('aria-expanded', open?'true':'false');
});
window.addEventListener('hashchange', render);
render();
</script>
